<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1d3b99" />
  <title>رقم ـ حالت آفلاین</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;background:#f4f6fb;color:#182033;font-family:Tahoma,Arial,sans-serif}.card{width:min(460px,100%);background:#fff;border:1px solid #e2e7f0;border-radius:26px;padding:28px;text-align:center;box-shadow:0 16px 42px rgba(15,37,90,.12)}.logo{width:72px;height:72px;margin:0 auto 16px;border-radius:22px;background:#1d3b99;color:#fff;display:grid;place-items:center;font-size:38px;font-weight:900}h1{margin:0 0 10px;color:#1d3b99}p{line-height:2;color:#657087}button{border:0;border-radius:14px;padding:12px 18px;background:#1d3b99;color:#fff;font:inherit;font-weight:900;cursor:pointer}
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">R</div>
    <h1>ارتباط برقرار نیست</h1>
    <p>اتصال اینترنت یا سرور را بررسی کنید. اگر برنامه قبلاً باز شده باشد، با زدن دکمه زیر نسخه ذخیره‌شده روی دستگاه نمایش داده می‌شود.</p>
    <button type="button" onclick="location.href='./'">تلاش دوباره</button>
  </main>
</body>
</html>
